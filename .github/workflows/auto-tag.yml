name: Auto Tag on Release Branch

on:
  # v.X.Y.0 — when the release branch is first created
  create:

  # v.X.Y.1+ — when a PR is merged into a release branch
  pull_request:
    types: [closed]
    branches:
      - "release-*"

permissions:
  contents: write

jobs:
  auto-tag-on-create:
    if: github.event_name == 'create' && github.event.ref_type == 'branch' && startsWith(github.event.ref, 'release-')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine tag version
        id: version
        run: |
          BRANCH="${{ github.event.ref }}"
          VERSION="${BRANCH#release-}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "::error::Branch '$BRANCH' does not match release-MAJOR.MINOR pattern"
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          TAG="v${MAJOR}.${MINOR}.0"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "📦 Will create tag: $TAG"
          fi

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  auto-tag-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine next patch version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.base.ref }}"
          VERSION="${BRANCH#release-}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "::error::Branch '$BRANCH' does not match release-MAJOR.MINOR pattern"
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          LATEST_PATCH=$(git tag -l "v${MAJOR}.${MINOR}.*" \
            | sed "s/v${MAJOR}\.${MINOR}\.//" \
            | sort -n \
            | tail -1)

          if [ -z "$LATEST_PATCH" ]; then
            PATCH=0
          else
            PATCH=$((LATEST_PATCH + 1))
          fi

          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Will create tag: $TAG (from merged PR #${{ github.event.pull_request.number }})"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }} (PR #${{ github.event.pull_request.number }})"
          git push origin "${{ steps.version.outputs.tag }}"
